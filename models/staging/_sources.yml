version: 2

sources:
  - name: raw_educacao
    description: >
      Fontes brutas educacionais anônimas (desafio RMI): equivalentes aos Parquets em
      gs://case_vagas/rmi/, carregadas no Postgres no schema definido por `vars.raw_schema`
      (padrão `raw_educacao`). IDs sensíveis vêm como texto hex (carga via `scripts/load_raw_educacao.py`).
    schema: "{{ var('raw_schema') }}"
    tables:
      - name: aluno
        description: >
          Cadastro de alunos (1 linha por aluno): id_aluno, id_turma, faixa_etaria, bairro
          (conforme blobs Parquet do bucket).

      - name: escola
        description: >
          Cadastro de unidades escolares (1 linha por escola): id_escola, bairro.

      - name: turma
        description: >
          Relação turma/aluno/ano (1 linha por vínculo): ano, id_turma, id_aluno.

      - name: frequencia
        description: >
          Frequência escolar por período/disciplina (granularidade da fonte): id_escola,
          id_aluno, id_turma, data_inicio, data_fim, disciplina, frequencia.

      - name: avaliacao
        description: >
          Notas e frequência por bimestre (1 linha por aluno/turma/bimestre na granularidade da fonte):
          id_aluno, id_turma, frequencia, bimestre, disciplina_1..4.
