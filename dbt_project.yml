name: "desafio_rmi_ds"
version: "1.0.0"
config-version: 2

profile: "desafio_rmi_ds"

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  desafio_rmi_ds:
    staging:
      +materialized: view
    intermediate:
      +materialized: ephemeral
    marts:
      +materialized: table

vars:
  # Schema físico das tabelas declaradas em `models/staging/_sources.yml` (carga: `EDUCACAO_RAW_SCHEMA`).
  educacao_raw_schema: educacao_raw
  # Por omissão, models sem `+schema` em dev (ver `macros/generate_schema_name.sql`).
  raw_schema: educacao_raw
